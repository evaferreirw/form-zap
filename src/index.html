<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form zap</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="topo">
            <img src="" alt="Whatsapp">
            <span>Empresa</span>
        </div>

    </div>
    <div class="mensagem">
        <p>
            Olá! Insira seus dados para ser direcionado para o WhatsApp:
        </p>
    </div>
    <form id="Formulário">
    <label> Seu nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome">

    <label> Seu e-mail</label>
    <input type="email" id="e-mail" placeholder="exemplo@gmail.com">

    <label> Seu WhatsApp</label>
    <input type="text" id="telefone" placeholder="+55 (99) 99999-99999">

    <button type="button" onclick="enviarWhats ()">
        Ir para WhatsApp
    </button>

</form>

<div class="footer">
    Powered by Agendor
</div>

<script src="src/script.js"></script>


    
</body>
</html>
